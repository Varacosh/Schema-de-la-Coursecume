<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schéma interactif de la Coursécume</title>

  <!-- Polices serif classiques pour une ambiance d'encyclopédie marine -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <main class="page">

    <!-- En-tête éditorial -->
    <header class="masthead">
      <div class="ornament-top" aria-hidden="true">
        <svg viewBox="0 0 200 20" xmlns="http://www.w3.org/2000/svg">
          <line x1="0" y1="10" x2="80" y2="10" stroke="currentColor" stroke-width="0.6" />
          <circle cx="90" cy="10" r="1.5" fill="currentColor" />
          <path d="M 95,10 Q 100,4 105,10 Q 100,16 95,10" fill="none" stroke="currentColor" stroke-width="0.6" />
          <circle cx="110" cy="10" r="1.5" fill="currentColor" />
          <line x1="120" y1="10" x2="200" y2="10" stroke="currentColor" stroke-width="0.6" />
        </svg>
      </div>

      <p class="eyebrow">Schéma interactif d'un navire à trois mâts</p>

      <h1 class="title">
        <span class="article">La</span>
        <span class="proper-name">Coursécume</span>
      </h1>

      <p class="tagline">
        <em>toute expliquée</em>
      </p>

      <div class="ornament-bottom" aria-hidden="true">
        <svg viewBox="0 0 300 30" xmlns="http://www.w3.org/2000/svg">
          <line x1="0" y1="15" x2="120" y2="15" stroke="currentColor" stroke-width="0.5" />
          <g transform="translate(150, 15)">
            <circle cx="0" cy="0" r="2" fill="currentColor" />
            <circle cx="-12" cy="0" r="1" fill="currentColor" />
            <circle cx="12" cy="0" r="1" fill="currentColor" />
          </g>
          <line x1="180" y1="15" x2="300" y2="15" stroke="currentColor" stroke-width="0.5" />
        </svg>
      </div>

      <p class="instruction">
        <span>Cliquez sur les points du schéma pour explorer chaque élément</span>
      </p>
    </header>

    <!-- Schéma du navire avec hotspots -->
    <section class="ship-section">
      <div class="ship-wrapper" id="shipWrapper">
        <img
          src="assets/medium_1_beige_chaud.png"
          alt="Schéma anatomique du navire La Coursécume"
          class="ship-image"
          id="shipImage"
        />
      </div>
    </section>

    <!-- Pied de page sobre -->
    <footer class="colophon">
      <p>
        <span class="dot">·</span>
        Planche d'anatomie navale
        <span class="dot">·</span>
      </p>
    </footer>

  </main>

  <!-- Modale d'information -->
  <div class="modal-backdrop" id="modalBackdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" id="modalClose" aria-label="Fermer">&times;</button>
      <div class="modal-letter" id="modalLetter">A</div>
      <h3 id="modalTitle">Titre</h3>
      <p id="modalDescription">Description</p>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
