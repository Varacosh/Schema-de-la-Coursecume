<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schéma interactif de la Coursécume</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --paper:       #e8dcc6;
      --paper-light: #f0e6d2;
      --ink:         #2a2218;
      --ink-soft:    #5c4a35;
      --ink-muted:   #8a7560;
      --c-mature:    #a04a3c;   /* rouge terre brûlée - mâts */
      --c-voiles:    #3d6b85;   /* bleu pétrole - voiles */
      --c-super:     #5a7548;   /* vert olive - superstructures */
      --serif-display: "Cormorant Garamond", "Garamond", serif;
      --serif-body:    "EB Garamond", "Garamond", "Georgia", serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: var(--serif-body);
      background: var(--paper);
      color: var(--ink);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(ellipse at top left, rgba(255, 248, 230, 0.5) 0%, transparent 50%),
        radial-gradient(ellipse at bottom right, rgba(120, 90, 55, 0.08) 0%, transparent 60%);
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 1500px;
      margin: 0 auto;
      padding: 4rem 2rem 3rem;
    }

    .masthead {
      text-align: center;
      margin-bottom: 3.5rem;
      animation: fade-up 1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ornament-top svg, .ornament-bottom svg {
      color: var(--ink-soft);
      opacity: 0.7;
      display: block;
      margin: 0 auto;
      height: auto;
    }
    .ornament-top svg    { width: 180px; margin-bottom: 1.5rem; }
    .ornament-bottom svg { width: 280px; margin: 1.5rem auto 1rem; }

    .eyebrow { font-style: italic; font-size: 1rem; letter-spacing: 0.15em; color: var(--ink-soft); margin: 0 0 1.2rem; }

    .title {
      font-family: var(--serif-display);
      font-weight: 500;
      margin: 0;
      line-height: 0.95;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.1em;
    }
    .title .article {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 300;
      font-style: italic;
      color: var(--ink-soft);
      letter-spacing: 0.05em;
      transform: translateX(-1.5em);
      margin-bottom: -0.2em;
    }
    .title .proper-name {
      font-size: clamp(3.5rem, 9vw, 7rem);
      font-weight: 500;
      color: var(--ink);
    }

    .tagline {
      font-family: var(--serif-display);
      font-size: clamp(1.2rem, 2vw, 1.6rem);
      font-weight: 300;
      font-style: italic;
      color: var(--ink-soft);
      margin: 0.5rem 0 0;
      letter-spacing: 0.04em;
    }

    .instruction { font-style: italic; font-size: 0.95rem; color: var(--ink-muted); margin: 0; }

    .ship-section { animation: fade-up 1.2s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both; }

    /* ========================================================
       LE CONTENEUR DE L'IMAGE
       ⚠️ aspect-ratio FORCÉ pour matcher exactement l'image originale (1679×937)
       Sans ça, les % de positionnement des hotspots dérivent.
       ======================================================== */
    .ship-wrapper {
      position: relative;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      aspect-ratio: 1679 / 937;
      border: 1px solid rgba(90, 70, 45, 0.18);
      background: var(--paper);
      box-shadow:
        0 1px 2px rgba(60, 40, 20, 0.06),
        0 8px 30px rgba(60, 40, 20, 0.10);
      overflow: hidden;
    }

    .ship-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: fill;  /* l'image remplit exactement le conteneur */
      user-select: none;
      -webkit-user-drag: none;
    }

    .colophon {
      text-align: center;
      margin-top: 3rem;
      font-style: italic;
      font-size: 0.9rem;
      letter-spacing: 0.15em;
      color: var(--ink-muted);
    }
    .colophon .dot { margin: 0 1rem; color: var(--ink-soft); }

    /* ========================================================
       HOTSPOTS
       ======================================================== */
    .hotspot {
      position: absolute;
      width: 32px;
      height: 32px;
      margin-left: -16px;
      margin-top: -16px;
      border-radius: 50%;
      background: var(--paper-light);
      border: 2px solid var(--hotspot-color, var(--ink));
      color: var(--hotspot-color, var(--ink));
      font-family: var(--serif-display);
      font-weight: 600;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s;
      box-shadow: 0 2px 6px rgba(60,40,20,0.25);
      z-index: 5;
      animation: pop-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .hotspot[data-cat="mature"] { --hotspot-color: var(--c-mature); }
    .hotspot[data-cat="voiles"] { --hotspot-color: var(--c-voiles); }
    .hotspot[data-cat="super"]  { --hotspot-color: var(--c-super);  }

    @keyframes pop-in {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .hotspot:hover, .hotspot:focus-visible {
      transform: scale(1.3);
      box-shadow: 0 4px 14px rgba(60,40,20,0.35);
      outline: none;
    }

    /* ========================================================
       MODALE
       ======================================================== */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(42, 34, 24, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
      padding: 1rem;
      animation: fade-in 0.25s ease;
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }
    .modal-backdrop[hidden] { display: none !important; }

    @keyframes fade-in { from {opacity:0;} to {opacity:1;} }

    .modal {
      position: relative;
      background: var(--paper-light);
      border: 1px solid rgba(90, 70, 45, 0.25);
      border-radius: 2px;
      max-width: 520px;
      width: 100%;
      padding: 3rem 2.8rem 2.2rem;
      box-shadow:
        0 1px 3px rgba(60, 40, 20, 0.1),
        0 25px 60px rgba(60, 40, 20, 0.3);
      animation: slide-up 0.35s cubic-bezier(0.34, 1.36, 0.64, 1);
      font-family: var(--serif-body);
      border-top: 3px solid var(--modal-color, var(--c-mature));
    }

    @keyframes slide-up {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    .modal::before {
      content: "";
      position: absolute;
      inset: 8px;
      border: 1px solid rgba(90, 70, 45, 0.18);
      border-radius: 1px;
      pointer-events: none;
    }

    .modal-ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      margin-bottom: 1.2rem;
      color: var(--modal-color, var(--c-mature));
      opacity: 0.6;
    }
    .modal-ornament .line { flex: 0 0 50px; height: 1px; background: currentColor; }
    .modal-ornament .dot  { width: 4px; height: 4px; border-radius: 50%; background: currentColor; }

    .modal-letter {
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--paper-light);
      border: 2px solid var(--modal-color, var(--c-mature));
      color: var(--modal-color, var(--c-mature));
      font-family: var(--serif-display);
      font-weight: 600;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 10px rgba(60, 40, 20, 0.2);
    }

    .modal h3 {
      font-family: var(--serif-display);
      font-weight: 500;
      margin: 0 0 0.3rem;
      font-size: 2rem;
      color: var(--ink);
      text-align: center;
    }

    .modal .subtitle {
      text-align: center;
      font-style: italic;
      color: var(--ink-muted);
      font-size: 0.95rem;
      margin: 0 0 1.5rem;
      letter-spacing: 0.05em;
    }

    .modal p.description {
      margin: 0;
      color: var(--ink-soft);
      font-size: 1.05rem;
      line-height: 1.75;
      text-align: justify;
      hyphens: auto;
      min-height: 5rem;
    }

    .modal p.description::first-letter {
      font-family: var(--serif-display);
      font-size: 3.2rem;
      font-weight: 500;
      float: left;
      line-height: 0.85;
      margin: 0.1rem 0.5rem 0 0;
      color: var(--modal-color, var(--c-mature));
    }

    .modal p.description.empty {
      color: var(--ink-muted);
      font-style: italic;
      text-align: center;
      opacity: 0.6;
    }
    .modal p.description.empty::first-letter {
      font-family: var(--serif-body);
      font-size: inherit;
      font-weight: inherit;
      float: none;
      line-height: inherit;
      margin: 0;
      color: inherit;
    }

    .modal-close {
      position: absolute;
      top: 0.6rem;
      right: 0.8rem;
      background: transparent;
      border: none;
      font-family: var(--serif-display);
      font-size: 1.8rem;
      line-height: 1;
      color: var(--ink-muted);
      cursor: pointer;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      z-index: 2;
      transition: background 0.15s, color 0.15s;
    }
    .modal-close:hover {
      background: rgba(90, 70, 45, 0.08);
      color: var(--ink);
    }

    @media (max-width: 700px) {
      .page { padding: 2rem 1rem; }
      .title .article { transform: translateX(-1em); }
      .ornament-top svg { width: 140px; }
      .ornament-bottom svg { width: 200px; }
      .hotspot { width: 26px; height: 26px; margin-left: -13px; margin-top: -13px; font-size: 13px; }
      .modal { padding: 2.5rem 1.5rem 1.5rem; }
      .modal h3 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <main class="page">

    <header class="masthead">
      <div class="ornament-top">
        <svg viewBox="0 0 200 20" xmlns="http://www.w3.org/2000/svg">
          <line x1="0" y1="10" x2="80" y2="10" stroke="currentColor" stroke-width="0.6" />
          <circle cx="90" cy="10" r="1.5" fill="currentColor" />
          <path d="M 95,10 Q 100,4 105,10 Q 100,16 95,10" fill="none" stroke="currentColor" stroke-width="0.6" />
          <circle cx="110" cy="10" r="1.5" fill="currentColor" />
          <line x1="120" y1="10" x2="200" y2="10" stroke="currentColor" stroke-width="0.6" />
        </svg>
      </div>

      <p class="eyebrow">Schéma interactif d'un navire à trois mâts</p>

      <h1 class="title">
        <span class="article">La</span>
        <span class="proper-name">Coursécume</span>
      </h1>

      <p class="tagline"><em>toute expliquée</em></p>

      <div class="ornament-bottom">
        <svg viewBox="0 0 300 30" xmlns="http://www.w3.org/2000/svg">
          <line x1="0" y1="15" x2="120" y2="15" stroke="currentColor" stroke-width="0.5" />
          <g transform="translate(150, 15)">
            <circle cx="0" cy="0" r="2" fill="currentColor" />
            <circle cx="-12" cy="0" r="1" fill="currentColor" />
            <circle cx="12" cy="0" r="1" fill="currentColor" />
          </g>
          <line x1="180" y1="15" x2="300" y2="15" stroke="currentColor" stroke-width="0.5" />
        </svg>
      </div>

      <p class="instruction">Cliquez sur les points du schéma pour explorer chaque élément</p>
    </header>

    // Couleurs par catégorie pour la modale
    const CAT_COLORS = {
      mature: "var(--c-mature)",
      voiles: "var(--c-voiles)",
      super:  "var(--c-super)"
    };

    const wrapper       = document.getElementById('shipWrapper');
    const modalBackdrop = document.getElementById('modalBackdrop');
    const modal         = document.querySelector('.modal');
    const modalLetter   = document.getElementById('modalLetter');
    const modalTitle    = document.getElementById('modalTitle');
    const modalSubtitle = document.getElementById('modalSubtitle');
    const modalDesc     = document.getElementById('modalDescription');
    const modalClose    = document.getElementById('modalClose');

    ANNOTATIONS.forEach((item, index) => {
      const btn = document.createElement('button');
      btn.className = 'hotspot';
      btn.dataset.letter = item.letter;
      btn.dataset.cat = item.cat;
      btn.style.left = item.x + '%';
      btn.style.top  = item.y + '%';
      btn.style.animationDelay = (1200 + index * 80) + 'ms';
      btn.textContent = item.letter;
      btn.setAttribute('aria-label', item.letter + (item.title ? ' : ' + item.title : ''));
      btn.addEventListener('click', () => openModal(item));
      wrapper.appendChild(btn);
    });

    function openModal(item) {
      modalLetter.textContent = item.letter;
      modalTitle.textContent = item.title || '— à compléter —';
      // Couleur de la catégorie
      modal.style.setProperty('--modal-color', CAT_COLORS[item.cat] || 'var(--c-mature)');
      if (item.subtitle) {
        modalSubtitle.textContent = item.subtitle;
        modalSubtitle.style.display = '';
      } else {
        modalSubtitle.style.display = 'none';
      }
      if (item.description) {
        modalDesc.textContent = item.description;
        modalDesc.classList.remove('empty');
      } else {
        modalDesc.textContent = 'Description à venir.';
        modalDesc.classList.add('empty');
      }
      modalBackdrop.hidden = false;
      modalClose.focus();
    }

    function closeModal() { modalBackdrop.hidden = true; }
    modalClose.addEventListener('click', closeModal);
    modalBackdrop.addEventListener('click', e => {
      if (e.target === modalBackdrop) closeModal();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && !modalBackdrop.hidden) closeModal();
    });
  </script>
